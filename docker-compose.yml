services:

  postgres:
    image: postgres:16
    container_name: aros-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: aros
      POSTGRES_USER: aros
      POSTGRES_PASSWORD: aros123
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data

  qdrant:
    image: qdrant/qdrant
    container_name: aros-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - ./data/qdrant:/qdrant/storage

  redis:
    image: redis:7
    container_name: aros-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  n8n:
    image: n8nio/n8n:latest
    container_name: aros-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_SECURE_COOKIE=false
      - DB_TYPE=sqlite
    volumes:
      - ./data/n8n:/home/node/.n8n
